name: 전력 이슈 특허 아카이브 (주간)

# ── 실행 시점 ───────────────────────────────────────────────
# 특허는 정기 공개(미국 화/목, 한국 공개공보)라 매일 돌릴 필요가 없어 주 1회 수집.
# "20 23 * * 0" = 일요일 23:20 UTC = 월요일 08:20 KST. (일일 뉴스 08:00 KST 직후)
on:
  schedule:
    - cron: "20 23 * * 0"   # 월요일 08:20 KST
  workflow_dispatch:        # Actions 탭에서 손으로 즉시 실행
    inputs:
      rotate:
        description: "출원인 시작 오프셋(비우면 주차 기반 자동 회전). 스로틀로 잘린 부분집합을 채울 때 사용"
        required: false
        default: ""

permissions:
  contents: write

# 일일 뉴스 워크플로와 같은 그룹 → gh-pages 강제푸시가 서로 겹치지 않도록 직렬화
concurrency:
  group: power-news-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v7
        with:
          fetch-depth: 0    # gh-pages 브랜치 접근용

      - name: 파이썬 설정
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"
        # 의존성 없음 — 표준 라이브러리만 사용

      - name: 이전 아카이브 복원 (gh-pages → _prev)
        run: |
          mkdir -p _prev
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch --depth=1 origin gh-pages
            git archive FETCH_HEAD | tar -x -C _prev
            echo "이전 아카이브 복원 완료"
          else
            echo "gh-pages 브랜치 없음 → 첫 실행(빈 아카이브에서 시작)"
          fi

      - name: 전력 특허 수집 + 사이트 생성 (뉴스+특허 탭)
        env:
          NEWS_PREV_DIR: _prev     # 이전 뉴스·특허 아카이브 로드
          NEWS_SITE_DIR: site      # 전체 사이트 재생성 대상
          PATENT_MOCK: "off"       # 특허 실데이터 강제 (러너는 외부망 정상)
          PATENT_ROTATE: ${{ github.event.inputs.rotate }}  # 수동 실행 시 시작 오프셋
        run: python build_site.py --collect patents

      - name: gh-pages 로 배포 (사이트 = 브랜치 루트)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          touch site/.nojekyll
          cd site
          git init -q
          git checkout -q -b gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "전력 특허 아카이브 갱신 ($(date -u +%F))"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages

      - name: 사이트 아티팩트 업로드 (백업)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: power-patents-site-${{ github.run_id }}
          path: site/
          retention-days: 14

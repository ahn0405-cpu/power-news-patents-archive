name: (임시) 특허 출원인 검색 프로브

# 무키 Google Patents 엔드포인트의 출원인(assignee) 검색·CPC 반환 여부 실측용.
# 손으로만 실행하고, 확인 후 이 워크플로와 probe_applicant.py 는 삭제한다.
on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - name: 출원인 검색 프로브 실행
        run: python probe_applicant.py
